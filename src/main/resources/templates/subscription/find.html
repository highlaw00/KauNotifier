<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}">
<!-- 최신 SpringBoot 에서는 layout:decorate="~{layout/layout}" 으로 사용 -->

<th:block layout:fragment="content">
    <!-- Begin Page Content -->
    <article class="grid">
        <div>
            <hgroup>
                <h1>알림 구독</h1>
                <h2>항공대 공지 알림 서비스</h2>
            </hgroup>
            <form method="post">
                <input type="email" name="email" placeholder="구독 시 입력했던 이메일을 입력해주세요." required/>
                <button type="submit" class="contrast">구독 정보 조회</button>
            </form>
        </div>
    </article>
</th:block>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}">
<!-- 최신 SpringBoot 에서는 layout:decorate="~{layout/layout}" 으로 사용 -->

<th:block layout:fragment="content">
    <!-- Begin Page Content -->
    <article class="grid">
        <hgroup>
            <h1>알림 구독</h1>
            <h2>항공대 공지 알림 서비스</h2>
        </hgroup>
        <div class="container">
            <form method="post">
                <label for="email">
                    이메일
                <input type="email" id="email" name="email" placeholder="알림을 받을 이메일을 입력해주세요" required/>
                </label>
                <details role="list">
                    <summary aria-haspopup="listbox">알림을 받을 공지사항 종류, 학과(학부)를 선택해주세요.</summary>
                    <ul role="listbox">
                        <li th:each="source : ${sourceList}">
                            <label th:for="${source.getSourceId()}">
                                <input th:id="${source.getSourceId()}" name="sourceList" type="checkbox" th:value="${source.getSourceId()}">
                                [[${source.description}]]
                            </label>
                        </li>
                    </ul>
                </details>

                <button type="submit" class="contrast">구독하기</button>
            </form>
        </div>
    </article>
</th:block>
</html>
